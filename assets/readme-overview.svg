  <text x="1076" y="540" class="small">초기 예제</text>
  <text x="1076" y="570" class="small">단일 폴더 버전</text>

  <path d="M364 250H412" stroke="#2B6CB0" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <path d="M788 250H838" stroke="#2F855A" stroke-width="4" marker-end="url(#arrowGreen)"/>
  <path d="M1037 388V428H610V410" stroke="#2F855A" stroke-width="4" marker-end="url(#arrowGreen)"/>

  <rect x="556" y="676" width="168" height="44" rx="16" fill="#102A43"/>
  <text x="587" y="705" style="font:700 18px 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; fill:#FFFFFF;">앱과 DB 연결</text>

  <rect x="64" y="690" width="1152" height="82" rx="24" fill="#FFFFFF" stroke="#D9E2EC" stroke-width="2"/>
  <text x="98" y="738" class="box-sub">Spring Boot 코드를 만들고 → 매니페스트로 배포하고 → Pod가 MySQL과 연결되고 → AWS 폴더로 배포 실습을 확장하는 구조</text>
</svg>
